name: Publish Prerelease

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          token: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is not configured for this repository." >&2
            exit 1
          fi

      - name: Verify npm authentication
        run: |
          npm whoami

      - name: Verify npm ownership for package
        shell: bash
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          NPM_USER=$(npm whoami)
          echo "Publishing as npm user: ${NPM_USER}"

          if npm view "${PKG_NAME}" name >/dev/null 2>&1; then
            echo "Package ${PKG_NAME} already exists; validating owner permissions."
            OWNERS=$(npm owner ls "${PKG_NAME}")
            echo "Current owners: ${OWNERS}"

            if ! echo "${OWNERS}" | grep -Eq "^${NPM_USER}[[:space:]]"; then
              echo "NPM user ${NPM_USER} is not an owner of ${PKG_NAME}." >&2
              echo "Use an NPM_TOKEN from an owner account or change package name." >&2
              exit 1
            fi
          else
            echo "Package ${PKG_NAME} does not exist yet; first publish path."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set alpha prerelease version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          npm version "$BASE_VERSION-alpha.${GITHUB_RUN_NUMBER}" --no-git-tag-version

      - name: Publish prerelease package
        run: npm publish --tag alpha
