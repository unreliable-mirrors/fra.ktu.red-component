name: Publish Prerelease

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          token: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is not configured for this repository." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set alpha prerelease version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          npm version "$BASE_VERSION-alpha.${GITHUB_RUN_NUMBER}" --no-git-tag-version

      - name: Publish prerelease package
        run: npm publish --tag alpha
