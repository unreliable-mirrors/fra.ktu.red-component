name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI script
        run: npm run ci
